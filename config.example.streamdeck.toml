# Stream Deck XL configuration for ttrpg-ai spotlight control
#
# Device selection: "streamdeck_xl" or "mx_creative" (default)
# Optional serial number to target a specific device

[device]
device_type = "streamdeck_xl"
# serial = "AL12H1A00001"    # uncomment to target a specific device

# OBS WebSocket (optional)
# [obs]
# host = "localhost"
# port = 4455
# password = "your-password"

# Button mappings (1-32 for Stream Deck XL, 8x4 grid)
# Row 1: buttons 1-8, Row 2: 9-16, Row 3: 17-24, Row 4: 25-32

# --- Row 1: Spotlight slots 1-8 ---
[[button]]
id = 1
label = "Slot 1"
action = "webhook"
method = "POST"
url = "http://localhost:3000/api/spotlight/1"

[[button]]
id = 2
label = "Slot 2"
action = "webhook"
method = "POST"
url = "http://localhost:3000/api/spotlight/2"

[[button]]
id = 3
label = "Slot 3"
action = "webhook"
method = "POST"
url = "http://localhost:3000/api/spotlight/3"

[[button]]
id = 4
label = "Slot 4"
action = "webhook"
method = "POST"
url = "http://localhost:3000/api/spotlight/4"

[[button]]
id = 5
label = "Slot 5"
action = "webhook"
method = "POST"
url = "http://localhost:3000/api/spotlight/5"

[[button]]
id = 6
label = "Slot 6"
action = "webhook"
method = "POST"
url = "http://localhost:3000/api/spotlight/6"

[[button]]
id = 7
label = "Slot 7"
action = "webhook"
method = "POST"
url = "http://localhost:3000/api/spotlight/7"

[[button]]
id = 8
label = "Slot 8"
action = "webhook"
method = "POST"
url = "http://localhost:3000/api/spotlight/8"

# --- Row 4: Transport controls ---
[[button]]
id = 25
label = "PTT ON"
action = "webhook"
method = "POST"
url = "http://localhost:3000/api/ptt/on"

[[button]]
id = 26
label = "PTT OFF"
action = "webhook"
method = "POST"
url = "http://localhost:3000/api/ptt/off"

[[button]]
id = 27
label = "Clear\nSpotlight"
action = "webhook"
method = "DELETE"
url = "http://localhost:3000/api/spotlight"

# --- Webhook polling: drive button active states from ttrpg-ai ---
# Polls GET /api/spotlight every 2 seconds and maps JSON fields to button LEDs
[[webhook_poll]]
url = "http://localhost:3000/api/spotlight"
interval_secs = 2

[webhook_poll.buttons]
# button_id = "json.path.to.boolean"
1 = "slots.1.spotlit"
2 = "slots.2.spotlit"
3 = "slots.3.spotlit"
4 = "slots.4.spotlit"
5 = "slots.5.spotlit"
6 = "slots.6.spotlit"
7 = "slots.7.spotlit"
8 = "slots.8.spotlit"
