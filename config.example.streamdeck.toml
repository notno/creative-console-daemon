# Stream Deck XL configuration for ttrpg-ai spotlight control
#
# Device selection: "streamdeck_xl" or "mx_creative" (default)
# Optional serial number to target a specific device

[device]
device_type = "streamdeck_xl"
# serial = "AL12H1A00001"    # uncomment to target a specific device

# OBS WebSocket (optional)
# [obs]
# host = "localhost"
# port = 4455
# password = "your-password"

# Button mappings (1-32 for Stream Deck XL, 8x4 grid)
# Row 1: buttons 1-8, Row 2: 9-16, Row 3: 17-24, Row 4: 25-32

# --- Row 1: Per-character spotlight (one button per character) ---
# Uses /api/spotlight/char/:name for individual character control
[[button]]
id = 1
label = "Char 1"
action = "webhook"
active_fg = [255, 255, 255]
active_bg = [255, 0, 0]
fg = [255, 0, 0]
bg = [255, 130, 130]
method = "POST"
url = "http://localhost:3000/api/spotlight/char/CharacterName"

# --- Row 3: Per-player spotlight (one button per player) ---
# Uses /api/spotlight/player/:name to toggle all characters for a player
[[button]]
id = 19
label = "Player 1"
action = "webhook"
active_fg = [255, 255, 255]
active_bg = [255, 0, 0]
fg = [255, 0, 0]
bg = [255, 130, 130]
method = "POST"
url = "http://localhost:3000/api/spotlight/player/PlayerName"

# --- Row 4: Transport controls ---
[[button]]
id = 25
label = "PTT"
action = "webhook"
active_fg = [255, 255, 255]
active_bg = [255, 0, 0]
fg = [10, 10, 10]
bg = [150, 150, 150]
method = "POST"
url = "http://localhost:3000/api/ptt/on"
release_url = "http://localhost:3000/api/ptt/off"

[[button]]
id = 32
label = "Clear\nSpotlight"
action = "webhook"
method = "DELETE"
url = "http://localhost:3000/api/spotlight"

# --- Webhook polling: drive button active states from ttrpg-ai ---
# Polls GET /api/spotlight every 2 seconds and maps JSON fields to button LEDs
#
# Available paths:
#   slots.<N>.spotlit          - by slot number (alphabetical order)
#   characters.<Name>.spotlit  - by character name (matches registered casing)
#   players.<Name>.spotlit     - by player name (true when ALL their characters are spotlit)
[[webhook_poll]]
url = "http://localhost:3000/api/spotlight"
interval_secs = 2

[webhook_poll.buttons]
# button_id = "json.path.to.boolean"
1 = "characters.CharacterName.spotlit"
19 = "players.PlayerName.spotlit"
